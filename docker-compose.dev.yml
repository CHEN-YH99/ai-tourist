version: '3.8'

services:
  # MongoDB Database (Development)
  mongodb:
    image: mongo:6-alpine
    container_name: travel-assistant-db-dev
    restart: always
    environment:
      MONGO_INITDB_ROOT_USERNAME: admin
      MONGO_INITDB_ROOT_PASSWORD: password
      MONGO_INITDB_DATABASE: travel-assistant-dev
    volumes:
      - mongodb_data_dev:/data/db
    ports:
      - "27017:27017"
    networks:
      - travel-network-dev
    healthcheck:
      test: echo 'db.runCommand("ping").ok' | mongosh localhost:27017/test --quiet
      interval: 10s
      timeout: 5s
      retries: 5

  # Backend API Server (Development)
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: travel-assistant-api-dev
    restart: always
    environment:
      NODE_ENV: development
      PORT: 3000
      MONGODB_URI: mongodb://admin:password@mongodb:27017/travel-assistant-dev?authSource=admin
      JWT_SECRET: dev-secret-key-change-in-production
      OPENAI_API_KEY: ${OPENAI_API_KEY}
      FRONTEND_URL: http://localhost:5173
      LOG_LEVEL: debug
    ports:
      - "3000:3000"
    depends_on:
      mongodb:
        condition: service_healthy
    networks:
      - travel-network-dev
    volumes:
      - ./backend/src:/app/src
      - ./backend/logs:/app/logs
      - ./backend/uploads:/app/uploads
    command: npm run dev
    healthcheck:
      test: ["CMD", "node", "-e", "require('http').get('http://localhost:3000/health', (r) => {if (r.statusCode !== 200) throw new Error(r.statusCode)})"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

volumes:
  mongodb_data_dev:
    driver: local

networks:
  travel-network-dev:
    driver: bridge
